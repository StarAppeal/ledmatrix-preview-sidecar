name: Build and Deploy Preview Service Sidecar

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: starappeal/ledmatrix-preview-sidecar

jobs:
  build:
    runs-on: heavy
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build
    uses: starappeal/deployment/.github/workflows/deploy.yml@5bd423f41254b8f1e55e16a89127ed4a212016a1
    with:
      service: preview-sidecar
      deploy_path:  ${{ vars.DEPLOY_PATH }}
    secrets: inherit